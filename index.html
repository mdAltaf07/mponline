<!DOCTYPE html>
<html>
<head>
<title>Bus List</title>

<style>
table{
border-collapse: collapse;
width:80%;
margin:auto;
}
th,td{
border:1px solid black;
padding:8px;
text-align:center;
}
th{
background:#ddd;
}
</style>

</head>
<body>

<h2 align="center">Bus List</h2>

<table id="busTable">
<tr>
<th>ID</th>
<th>Bus Code</th>
<th>Route Name</th>
<th>Latitude</th>
<th>Longitude</th>
<th>Status</th>
</tr>
</table>

<script>

fetch("https://mosam.store/drive/get_buses.php")
.then(response => response.text())
.then(text => {

console.log("RAW =", text)

let data = JSON.parse(text)

console.log("JSON =", data)

let table = document.getElementById("busTable");

data.forEach(bus => {

let row = table.insertRow();

row.insertCell(0).innerHTML = bus.id;
row.insertCell(1).innerHTML = bus.bus_code;
row.insertCell(2).innerHTML = bus.route_name;
row.insertCell(3).innerHTML = bus.last_latitude;
row.insertCell(4).innerHTML = bus.last_longitude;
row.insertCell(5).innerHTML = bus.status;

});

})
.catch(err=>{
console.log("ERROR =", err)
})

</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<title>Add Bus</title>
</head>
<body>

<h2>Add Bus</h2>

<form id="busForm">
    Bus Code: <input type="text" name="bus_code" required><br><br>
    Route Name: <input type="text" name="route_name" required><br><br>
    Latitude: <input type="number" step="any" name="latitude"><br><br>
    Longitude: <input type="number" step="any" name="longitude"><br><br>

    <button type="submit">Save</button>
</form>

<p id="msg"></p>

<script>
document.getElementById("busForm").addEventListener("submit", function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch("https://mosam.store/drive/add_bus.php",{
        method:"POST",
        body: formData
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("msg").innerHTML = data.message;
    })
    .catch(err=>{
        console.log(err);
    });

});
</script>

</body>
</html>
