<script>

const listContainer = document.getElementById('serviceList');
const searchInput = document.getElementById('searchInput');

let allDocs = [];

function loadDocs(){

fetch("https://mosam.store/mponline/get_documents.php")
.then(res=>res.json())
.then(data=>{
allDocs = data;
renderList(data);
});

}

function renderList(data){

listContainer.innerHTML = "";

if(data.length==0){
listContainer.innerHTML = `<div class='service-item'>कोई सेवा नहीं मिली</div>`;
return;
}

data.forEach((doc,index)=>{

const div = document.createElement('div');
div.className = 'service-item';

div.innerHTML = `<b>${index+1}.</b> ${doc.hindi_name} (${doc.document_name})`;

div.onclick = ()=>showDetail(doc);

listContainer.appendChild(div);

});

}

function showDetail(doc){

let html = `
<div class="service-item" style="flex-direction:column;align-items:flex-start">

<h3>${doc.hindi_name}</h3>

<p><b>आवश्यक दस्तावेज:</b><br>
${doc.required_documents ? doc.required_documents : "जानकारी उपलब्ध नहीं"}
</p>
`;

if(doc.form_file){

html += `
<a href="https://mosam.store/mponline/files/${doc.form_file}" target="_blank">
<button style="margin-top:10px">Download Form</button>
</a>

<button onclick="window.print()" style="margin-top:10px">Print</button>
`;
}

html += `<button onclick="loadDocs()" style="margin-top:10px">⬅ Back</button></div>`;

listContainer.innerHTML = html;

}

searchInput.addEventListener("input",()=>{

let term = searchInput.value.toLowerCase();

let filtered = allDocs.filter(doc =>
doc.document_name.toLowerCase().includes(term) ||
doc.hindi_name.toLowerCase().includes(term)
);

renderList(filtered);

});

loadDocs();

</script>
