<!DOCTYPE html>
<html>
<head>
<title>Bus List</title>

<style>
table{
border-collapse: collapse;
width:80%;
margin:auto;
}
th,td{
border:1px solid black;
padding:8px;
text-align:center;
}
th{
background:#ddd;
}
</style>

</head>
<body>

<h2 align="center">Bus List</h2>

<table id="busTable">
<tr>
<th>ID</th>
<th>Bus Code</th>
<th>Route Name</th>
<th>Latitude</th>
<th>Longitude</th>
<th>Status</th>
</tr>
</table>

<script>
fetch("https://mosam.store/drive/get_buses.php")
.then(res => res.json())
.then(data => {

let table = document.getElementById("busTable");

data.forEach(bus => {

let row = table.insertRow();

row.insertCell(0).innerHTML = bus.id;
row.insertCell(1).innerHTML = bus.bus_code;
row.insertCell(2).innerHTML = bus.route_name;
row.insertCell(3).innerHTML = bus.last_latitude;
row.insertCell(4).innerHTML = bus.last_longitude;
row.insertCell(5).innerHTML = bus.status;

});

});
</script>

</body>
</html>
