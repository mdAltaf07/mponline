<!DOCTYPE html>
<html>
<head>
<title>Upload Document</title>
  <style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(120deg,#43cea2,#185a9d);
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

form{
    background:#fff;
    padding:30px;
    width:380px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    position:absolute;
    top:40px;
    color:white;
    letter-spacing:1px;
}

input, textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-top:5px;
    font-size:14px;
}

textarea{
    resize:none;
    height:80px;
}

button{
    width:100%;
    padding:12px;
    background:#185a9d;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

button:hover{
    background:#0f3d6b;
}

#msg{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    color:#185a9d;
}

</style>
</head>
<body>

<h2>Upload Document</h2>

<form id="docForm">

English Name:<br>
<input type="text" name="document_name"><br><br>

Hindi Name:<br>
<input type="text" name="hindi_name"><br><br>

Required Documents:<br>
<textarea name="required_documents"></textarea><br><br>

Upload File:<br>
<input type="file" name="form_file"><br><br>

<button>Upload</button>

</form>

<p id="msg"></p>

<script>

document.getElementById("docForm").addEventListener("submit",function(e){

e.preventDefault();

let formData = new FormData(this);

fetch("https://mosam.store/mponline/upload_document.php",{
method:"POST",
body:formData,
credentials:"include"   // ⭐ session cookie send karega
})
.then(res=>res.json())
.then(data=>{

if(data.message=="Unauthorized"){
window.location="admin_login.html";
return;
}

document.getElementById("msg").innerHTML=data.message;
document.getElementById("docForm").reset();

});

});

</script>

</body>
</html>
