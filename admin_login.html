<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
</head>
<body>

<h2>Admin Login</h2>

<form id="loginForm">

Username:<br>
<input type="text" name="username"><br><br>

Password:<br>
<input type="password" name="password"><br><br>

<button>Login</button>

</form>

<p id="msg"></p>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let formData = new FormData(this);

fetch("https://mosam.store/mponline/admin_login.php",{
method:"POST",
body:formData
})
.then(res=>res.json())
.then(data=>{

if(data.status=="success"){

localStorage.setItem("adminLogin","yes");

window.location="admin_upload.html";

}else{

document.getElementById("msg").innerHTML="Wrong Login";

}

});

});

</script>

</body>
</html>
