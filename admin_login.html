<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
  <style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

form{
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    width:300px;
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    margin-top:5px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#4facfe;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#2f80ed;
}

#msg{
    text-align:center;
    color:red;
    margin-top:10px;
    font-weight:bold;
}

</style>
</head>
<body>

<h2>Admin Login</h2>

<form id="loginForm">

Username:<br>
<input type="text" name="username"><br><br>

Password:<br>
<input type="password" name="password"><br><br>

<button>Login</button>

</form>

<p id="msg"></p>
<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let formData = new FormData(this);

fetch("https://mosam.store/mponline/admin_login.php",{
method:"POST",
body:formData,
credentials:"include"   // ⭐ session cookie send karega
})
.then(res=>res.json())
.then(data=>{

if(data.status=="success"){

window.location="admin_upload.html";   // ⭐ localStorage hata diya

}else{

document.getElementById("msg").innerHTML="Wrong Login";

}

});

});

</script>

</body>
</html>
