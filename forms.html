<!DOCTYPE html>
<html lang="hi-IN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Forms - JSRC Pawai</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
:root{
 --blue:#0a4c9a;
 --bg:#f4f7f6;
 --border:#e0e0e0;
}
body{
 margin:0;
 font-family:Inter,Arial;
 background:var(--bg);
}
/* HEADER */
header{
 background:var(--blue);
 color:#fff;
 padding:12px 16px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 flex-wrap:wrap;
 gap:10px;
}
.header-left{
 display:flex;
 align-items:center;
 gap:10px;
}
header img{
 width:45px;
 height:45px;
 border-radius:50%;
 border:2px solid #fff;
 cursor:pointer;
}
.header-titles h1{margin:0;font-size:1.2rem;}
.header-titles h6{margin:0;font-size:.85rem;opacity:.85;}
.header-right{display:flex;gap:12px;}
.home-btn{
 background:rgba(255,255,255,.15);
 padding:7px 12px;
 border-radius:6px;
 text-decoration:none;
 color:#fff;
}
.whatsapp{font-size:1.6rem;color:#fff;}

/* MAIN */
main{max-width:600px;margin:30px auto;padding:0 15px;}
h2{text-align:center;color:var(--blue);}

/* SEARCH */
.search-box{margin:20px 0;}
.search-box input{
 width:100%;
 padding:12px 18px;
 border-radius:25px;
 border:1px solid #ccc;
 font-size:1rem;
}

/* FORM LIST */
.form-list{display:flex;flex-direction:column;gap:12px;}
.form-item{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:#fff;
 padding:14px 20px;
 border-radius:8px;
 border:1px solid var(--border);
}
.form-name{display:flex;align-items:center;gap:10px;font-weight:500;}
.download-btn{
 background:var(--blue);
 color:#fff;
 padding:7px 14px;
 border-radius:6px;
 text-decoration:none;
 font-size:.9rem;
}
.print-btn{
 background:#28a745;
 color:#fff;
 padding:7px 14px;
 border-radius:6px;
 border:none;
 cursor:pointer;
 font-size:.9rem;
 margin-left:8px;
}
.print-btn:hover{background:#218838;}

/* FOOTER */
footer{text-align:center;padding:25px 10px;border-top:1px solid var(--border);font-size:.9rem;}

/* IMAGE MODAL */
.img-modal{
 display:none;
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.85);
 justify-content:center;
 align-items:center;
 z-index:9999;
}
.img-modal img{
 max-width:90%;
 max-height:90%;
 border-radius:10px;
}
.close-btn{
 position:absolute;
 top:20px;
 right:25px;
 font-size:32px;
 color:#fff;
 cursor:pointer;
}
</style>

</head>
<body>

<header>
  <div class="header-left">
    <img src="photo.png" id="profileImg">
    <div class="header-titles">
      <h1>JAY SHRI RAM COMPUTER</h1>
      <h6>deepak mponline pawai</h6>
    </div>
  </div>
  <div class="header-right">
    <a href="index.html" class="home-btn">🏠 Home</a>
    <a href="https://wa.me/918839142440" class="whatsapp" target="_blank">
      <i class="bi bi-whatsapp"></i>
    </a>
  </div>
</header>

<main>
  <h2>Available Forms</h2>
  <div class="search-box">
    <input id="searchInput" placeholder="Search / फॉर्म खोजें (आय, aay, jati, nivas...)">
  </div>
  <div class="form-list" id="formList"></div>
</main>


<footer>
  <div class="contact-details">
    <p><i class="bi bi-telephone-fill"></i> +91 8839142440</p>
    <p><i class="bi bi-geo-alt-fill"></i> Tahsheel Parishad Pawai, 488446</p>
  </div>

  <p class="copyright-text">
    © <span id="year"></span> JSRC. All Rights Reserved.
  </p>
  <a href="https://mdaltaf07.github.io/profile/" target="_blank" rel="noopener">
   Contact Developer 👆/ डेवलपर से संपर्क करें👆
  </a>
</footer>

<!-- IMAGE MODAL -->
<div id="imgModal" class="img-modal">
  <span class="close-btn">&times;</span>
  <img id="modalImg">
</div>


 
 <script>

const list = document.getElementById("formList");
const input = document.getElementById("searchInput");

let allForms = [];

// ✅ LOAD DATA FROM API
function loadForms(){

fetch("https://mosam.store/mponline/get_forms.php")
.then(res => res.json())
.then(data => {

allForms = data;
render(data);

})
.catch(err=>{
console.log("Error:",err);
});

}

// ✅ RENDER FUNCTION
function render(data){

list.innerHTML="";

if(data.length==0){
list.innerHTML="<div class='form-item'>कोई फॉर्म नहीं मिला</div>";
return;
}

data.forEach(doc=>{

list.innerHTML += `
<div class="form-item">

<div class="form-name">
<i class="bi bi-file-earmark-pdf-fill"></i>

<div>
<div style="font-weight:600">${doc.hindi_name}</div>
<div style="font-size:13px;color:#666">
${doc.document_name}
</div>
</div>

</div>

<div>
<a href="https://mosam.store/mponline/files/${doc.form_file}" 
class="download-btn" target="_blank">Download</a>

<button class="print-btn"
onclick="printFile('${doc.form_file}')">Print</button>
</div>

</div>
`;

});

}

// ✅ PRINT FUNCTION
function printFile(file){

let url = "https://mosam.store/mponline/files/"+file;

let w = window.open(url);

w.onload = ()=>{
w.print();
};

}

// ✅ SEARCH
input.addEventListener("input",()=>{

let t = input.value.toLowerCase();

let filtered = allForms.filter(x =>
x.hindi_name.toLowerCase().includes(t) ||
x.document_name.toLowerCase().includes(t)
);

render(filtered);

});

// ✅ LOAD FIRST TIME
loadForms();

</script>
</body>
</html>
