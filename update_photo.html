<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEEPAK SAHU MPONLINE SHOP | JSRC Pawai</title>

<link rel="icon" type="image/png" href="photo.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#f4f7f6;
}

/* HEADER */
header{
display:flex;
align-items:center;
justify-content:space-between;
background:#0a4c9a;
color:white;
padding:12px 16px;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

header img{
width:45px;
height:45px;
border-radius:50%;
border:2px solid white;
}

header h1{
margin:0;
font-size:20px;
}

header h6{
margin:0;
font-weight:400;
}

/* MAIN */

main{
max-width:500px;
margin:40px auto;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
background:#0a4c9a;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#083b77;
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
margin-top:40px;
border-top:1px solid #ddd;
color:#555;
font-size:14px;
}

</style>

</head>
<body>

<header>

<div class="header-left">
<img src="photo.png">
<div>
<h1>JAY SHRI RAM COMPUTER</h1>
<h6>deepak mponline pawai</h6>
</div>
</div>

</header>

<main>

<div class="card">

<h2>Update Profile Photo</h2>

<form id="photoForm">

<input type="file" name="photo" required>

<button>Update Photo</button>

</form>

<p id="msg"></p>

</div>

</main>

<footer>

© <span id="year"></span> JSRC Pawai

</footer>

<script>

document.getElementById("year").innerHTML=new Date().getFullYear();

document.getElementById("photoForm").addEventListener("submit",function(e){

e.preventDefault();

let formData = new FormData(this);

fetch("https://mosam.store/mponline/update_photo.php",{
method:"POST",
body:formData,
credentials:"include"
})
.then(res=>res.json())
.then(data=>{
document.getElementById("msg").innerHTML=data.message;
});

});

</script>

</body>
</html>
